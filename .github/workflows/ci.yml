name: CI

on:
  push:
    branches: [master, rewrite]
  pull_request:

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:unit

  e2e:
    needs: lint-and-unit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run e2e tests (Linux, via xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test:e2e
      - name: Run e2e tests
        if: runner.os != 'Linux'
        run: npm run test:e2e
