<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<style>
			html,
			body {
				margin: 0;
				height: 100%;
				overflow: hidden;
				font-family: system-ui, 'Segoe UI', sans-serif;
				background: #20232a;
				color: #e8e8e8;
				user-select: none;
			}
			.bar {
				display: flex;
				align-items: center;
				gap: 6px;
				height: 100%;
				padding: 0 8px;
				box-sizing: border-box;
				border-bottom: 1px solid #2f333b;
			}
			button {
				flex-shrink: 0;
				width: 28px;
				height: 26px;
				border: none;
				border-radius: 6px;
				background: transparent;
				color: #e8e8e8;
				font-size: 14px;
				cursor: pointer;
			}
			button:hover {
				background: #323744;
			}
			button:disabled {
				opacity: 0.35;
				cursor: default;
			}
			#url {
				flex: 1;
				min-width: 0;
				height: 24px;
				line-height: 24px;
				padding: 0 10px;
				border-radius: 6px;
				background: #14161a;
				border: 1px solid #3a3f4b;
				font-size: 12px;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				color: #b8bcc4;
			}
			#url .host {
				color: #e8e8e8;
				font-weight: 600;
			}
			.wide {
				width: auto;
				padding: 0 8px;
				font-size: 12px;
			}
			#copied {
				position: fixed;
				right: 10px;
				top: 42px;
				background: #323744;
				padding: 4px 10px;
				border-radius: 6px;
				font-size: 11px;
				opacity: 0;
				transition: opacity 0.2s;
				pointer-events: none;
			}
		</style>
	</head>
	<body>
		<div class="bar">
			<button id="back" title="Atrás">←</button>
			<button id="fwd" title="Adelante">→</button>
			<button id="reload" title="Recargar">⟳</button>
			<div id="url" title=""></div>
			<button id="copy" class="wide" title="Copiar enlace">Copiar</button>
			<button id="external" class="wide" title="Abrir en el navegador del sistema">Abrir en navegador</button>
		</div>
		<div id="copied">Copiado</div>
		<script>
			const urlEl = document.getElementById('url')
			const backBtn = document.getElementById('back')
			const fwdBtn = document.getElementById('fwd')

			window.linkbar.onState((state) => {
				urlEl.title = state.url
				try {
					const u = new URL(state.url)
					urlEl.innerHTML = ''
					const host = document.createElement('span')
					host.className = 'host'
					host.textContent = u.host
					urlEl.append(u.protocol + '//', host, u.pathname + u.search + u.hash)
				} catch {
					urlEl.textContent = state.url
				}
				backBtn.disabled = !state.canGoBack
				fwdBtn.disabled = !state.canGoForward
			})

			backBtn.onclick = () => window.linkbar.goBack()
			fwdBtn.onclick = () => window.linkbar.goForward()
			document.getElementById('reload').onclick = () => window.linkbar.reload()
			document.getElementById('external').onclick = () => window.linkbar.openExternal()
			document.getElementById('copy').onclick = () => {
				window.linkbar.copyUrl()
				const toast = document.getElementById('copied')
				toast.style.opacity = 1
				setTimeout(() => (toast.style.opacity = 0), 1200)
			}
		</script>
	</body>
</html>
